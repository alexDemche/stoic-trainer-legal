<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoic Trainer | Support</title>
    <style>
        body {
            background-color: #121212;
            color: #E0C9A6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(224, 201, 166, 0.05);
            padding: 40px 20px;
            border-radius: 24px;
            border: 1px solid rgba(224, 201, 166, 0.2);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        p {
            color: #A0A0A0;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            background-color: #E0C9A6;
            color: #121212;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn-outline {
            background-color: transparent;
            color: #E0C9A6;
            border: 1px solid #E0C9A6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Support</h1>
        <p>Choose how you would like to contact us for technical support or feedback.</p>

        <a href="https://t.me/YOUR_TELEGRAM_COMMUNITY_LINK" class="btn" target="_blank">Telegram Community</a>
        
        <a href="mailto:alexeyydemchenko@gmail.com?subject=Stoic Trainer Support" class="btn btn-outline">Email Support</a>
    </div>

</body>
</html>
